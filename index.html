<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#111827">
  <title>Class Tool</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;800&display=swap">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/moonspam/NanumSquare@master/nanumsquare.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    :root {
      --bg: #0b1020; --bg-soft: #111827;
      --card: #ffffff; --card-dark: #1e293b;
      --text: #f8fafc; --text-dark: #0f172a;
      --muted: #94a3b8; --line: rgba(255,255,255,0.1);
      --accent: #3b82f6; --accent-soft: #60a5fa;
      --ok: #22c55e; --danger: #ef4444;
      --shadow: 0 20px 50px rgba(0,0,0,0.28);
    }
    html, body {
      margin: 0; min-height: 100%;
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
      background: radial-gradient(ellipse 120% 80% at 50% -10%, #1e3a5f 0%, var(--bg) 55%);
      color: var(--text);
    }
    body { min-height: 100dvh; }
    .app { max-width: 1180px; margin: 0 auto; padding: 18px 20px 36px; }
    .top-bar {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 16px; gap: 12px;
    }
    .app-name { font-size: 1rem; color: var(--muted); letter-spacing: 0.02em; }
    .btn {
      border: none; border-radius: 14px; padding: 13px 22px;
      font-size: 1rem; font-weight: 700; cursor: pointer;
      background: var(--card-dark); color: var(--text); font-family: inherit;
      transition: transform 0.15s, opacity 0.15s;
    }
    .btn:active { transform: scale(0.98); }
    .btn.primary { background: linear-gradient(135deg, #2563eb, #3b82f6); color: #fff; }
    .btn.danger { background: rgba(239,68,68,0.18); color: #fecaca; }
    .btn.small { padding: 8px 12px; font-size: 0.9rem; }
    .btn.icon-btn { background: linear-gradient(135deg, #2563eb, #3b82f6); color: #fff; }

    .activity-bar {
      display: flex; gap: 8px; overflow-x: auto; padding: 4px 2px 12px;
      margin-bottom: 14px; scrollbar-width: thin;
    }
    .activity-chip {
      flex: 1 0 140px; max-width: 200px;
      border: 1px solid var(--line); background: rgba(255,255,255,0.04);
      color: var(--text); border-radius: 16px; padding: 12px 14px;
      cursor: pointer; text-align: left; font-family: inherit;
      display: flex; align-items: flex-start; gap: 10px;
      transition: border-color 0.15s, background 0.15s;
    }
    .activity-chip .step {
      flex-shrink: 0; width: 28px; height: 28px; border-radius: 999px;
      display: grid; place-items: center; font-size: 0.85rem; font-weight: 800;
      background: rgba(255,255,255,0.08); color: var(--muted);
    }
    .activity-chip .chip-body { min-width: 0; }
    .activity-chip strong {
      display: block; font-size: 0.95rem; margin-bottom: 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .activity-chip span { font-size: 0.8rem; color: var(--muted); }
    .activity-chip.active {
      border-color: var(--accent-soft);
      background: rgba(59,130,246,0.16);
      box-shadow: inset 0 0 0 1px rgba(96,165,250,0.25);
    }
    .activity-chip.active .step { background: var(--accent); color: #fff; }

    .hero {
      text-align: center; margin-bottom: 18px; padding: 0 8px;
    }
    .hero-eyebrow {
      margin: 0 0 8px; font-size: 0.9rem; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent-soft);
    }
    .hero-eyebrow:empty, .hero-eyebrow[hidden], .announcement-title[hidden] { display: none !important; }
    .hero.compact { margin-bottom: 10px; }
    .hero[hidden] { display: none !important; }
    .announcement-title {
      margin: 0; font-size: clamp(1.8rem, 4.5vw, 2.8rem);
      font-weight: 800; line-height: 1.2;
    }
    .announcement-title.display-text { font-family: var(--display-font, "Malgun Gothic", sans-serif); }
    .announcement-sub {
      margin: 12px auto 0; max-width: 720px;
      font-size: clamp(1.05rem, 2.4vw, 1.35rem);
      color: #cbd5e1; line-height: 1.65;
    }
    .announcement-sub.display-text { font-size: clamp(2rem, 8vw, 3.5rem); font-weight: 800; color: #f8fafc; }
    .announcement-sub:empty { display: none; }

    .stage {
      display: grid; gap: 18px; margin-bottom: 20px;
      grid-template-columns: 1fr; align-items: stretch;
    }
    .stage.layout-duo { grid-template-columns: repeat(2, 1fr); }
    .stage.layout-text-timer { grid-template-columns: repeat(2, 1fr); }
    .stage.layout-triple { grid-template-columns: repeat(3, 1fr); }
    .stage.layout-duo > *,
    .stage.layout-text-timer > *,
    .stage.layout-triple > * { min-width: 0; }
    .stage.layout-timer { max-width: 640px; margin-left: auto; margin-right: auto; }
    .image-panel[hidden], .text-panel[hidden], .timer-panel[hidden] { display: none !important; }

    .image-panel {
      background: var(--card); border-radius: 24px; padding: 16px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: var(--shadow); min-height: 280px;
    }
    .image-panel img {
      max-width: 100%; max-height: min(62vh, 560px);
      object-fit: contain; border-radius: 12px;
    }
    .layout-duo .image-panel,
    .layout-triple .image-panel {
      min-height: 320px; padding: 12px;
      background: rgba(255,255,255,0.97);
    }
    .layout-duo .image-panel img,
    .layout-triple .image-panel img {
      width: 100%; max-height: min(52vh, 480px);
    }
    .layout-duo .timer-panel,
    .layout-text-timer .timer-panel,
    .layout-triple .timer-panel {
      width: 100%; min-height: 320px; margin: 0;
    }
    .layout-duo .timer-ring,
    .layout-text-timer .timer-ring,
    .layout-triple .timer-ring { width: min(100%, 300px); }
    .layout-duo .timer-actions,
    .layout-text-timer .timer-actions,
    .layout-triple .timer-actions { max-width: 100%; width: 100%; }

    .text-panel {
      background: linear-gradient(180deg, #1e293b 0%, #111827 100%);
      border: 1px solid var(--line); border-radius: 28px;
      padding: 28px 24px; box-shadow: var(--shadow);
      display: flex; align-items: center; justify-content: center;
      min-height: 320px;
    }
    .text-panel-body {
      margin: 0; width: 100%;
      font-size: clamp(2.2rem, 9vw, 4.2rem);
      font-weight: 800; color: #f8fafc;
      text-align: center; letter-spacing: -0.02em;
    }
    .text-line { display: block; line-height: 1.35; }
    .text-line + .text-line { margin-top: 0.28em; }
    .display-text { font-family: var(--display-font, "Malgun Gothic", sans-serif); }
    .timer-panel {
      background: linear-gradient(180deg, #1e293b 0%, #111827 100%);
      border: 1px solid var(--line); border-radius: 28px;
      padding: 28px 24px 24px; box-shadow: var(--shadow);
      display: flex; flex-direction: column; align-items: center; gap: 20px;
      min-height: 320px;
    }
    .timer-ring {
      width: min(100%, 360px); aspect-ratio: 1; border-radius: 50%;
      display: grid; place-items: center;
      background: radial-gradient(circle at 50% 35%, rgba(59,130,246,0.18), transparent 65%);
      border: 3px solid rgba(96,165,250,0.35);
    }
    .timer-core { text-align: center; }
    .activity-badge { display: none; }
    .timer-face {
      font-size: clamp(3.5rem, 14vw, 5.5rem); font-weight: 800;
      font-variant-numeric: tabular-nums; line-height: 1; letter-spacing: -0.02em;
    }
    .timer-label { margin-top: 8px; font-size: 1.05rem; color: var(--muted); }
    .timer-panel.running .timer-face { color: var(--ok); }
    .timer-panel.running .timer-ring { border-color: rgba(34,197,94,0.55); }
    .timer-panel.finished .timer-face { color: var(--danger); }
    .timer-panel.finished .timer-ring { border-color: rgba(239,68,68,0.55); }

    .timer-actions {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
      width: 100%; max-width: 420px;
    }
    .timer-actions .btn {
      padding: 16px 10px; font-size: 1.05rem; border-radius: 16px;
    }
    .timer-actions .btn.primary { grid-column: span 1; }

    .settings {
      background: rgba(255,255,255,0.04); border: 1px solid var(--line);
      border-radius: 20px; padding: 22px 24px;
    }
    .settings h2 { margin: 0 0 8px; font-size: 1.2rem; }
    .field { margin-bottom: 14px; }
    .field.row { display: flex; gap: 12px; align-items: end; flex-wrap: wrap; }
    label { display: block; margin-bottom: 6px; color: var(--muted); font-size: 0.95rem; }
    input[type="text"], input[type="number"], input[type="file"], select, textarea {
      width: 100%; padding: 12px 14px;
      border: 1px solid rgba(255,255,255,0.12); border-radius: 12px;
      background: rgba(15,23,42,0.75); color: var(--text);
      font-size: 1rem; font-family: inherit;
    }
    .field.row input[type="number"], .field.row select { width: 160px; }
    .content-checks {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
    }
    .check-label {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      color: var(--text); font-size: 1rem; cursor: pointer;
      padding: 13px 12px; border-radius: 12px;
      background: rgba(255,255,255,0.04); border: 1px solid var(--line);
    }
    .check-label input { width: auto; margin: 0; accent-color: var(--accent); }
    .check-label:has(input:checked) { border-color: var(--accent-soft); background: rgba(59,130,246,0.14); }
    .content-fields-row {
      display: flex; gap: 12px; margin-top: 12px; align-items: stretch;
    }
    .content-fields-row[hidden] { display: none !important; }
    .content-panel {
      flex: 1; min-width: 0; padding: 14px 16px; border-radius: 14px;
      background: rgba(15,23,42,0.55); border: 1px solid var(--line);
    }
    .content-panel[hidden] { display: none !important; }
    .content-panel .field { margin-bottom: 0; }
    .content-panel textarea { min-height: 110px; resize: vertical; }
    .save-toast {
      margin-top: 10px; padding: 10px 14px; border-radius: 10px;
      background: rgba(34,197,94,0.18); color: #bbf7d0; font-size: 0.95rem;
    }
    .save-toast[hidden] { display: none !important; }
    .thumb-row { display: flex; align-items: center; gap: 12px; margin-top: 10px; }
    .thumb-row img { max-height: 80px; border-radius: 8px; }
    .settings-actions { display: flex; flex-wrap: wrap; gap: 10px; }
    .hint { margin: 0; font-size: 0.9rem; color: var(--muted); }
    .hint.top { margin-bottom: 16px; }

    .exit-present {
      position: fixed; top: 14px; right: 14px; z-index: 100;
      border: 1px solid var(--line); border-radius: 999px; padding: 11px 16px;
      background: rgba(17,24,39,0.82); color: white; font-size: 0.95rem;
      cursor: pointer; font-family: inherit; backdrop-filter: blur(8px);
    }

    body.present { background: #0a0f1a; }
    body.present .top-bar, body.present .settings { display: none; }
    body.present .app {
      max-width: none; min-height: 100dvh; padding: 16px 20px 24px;
      display: flex; flex-direction: column;
    }
    body.present .activity-bar { flex-shrink: 0; margin-bottom: 10px; }
    body.present .activity-chip { flex: 1 0 0; max-width: none; padding: 10px 12px; }
    body.present .activity-chip strong { font-size: 0.88rem; }
    body.present .hero { flex-shrink: 0; margin-bottom: 14px; }
    body.present .announcement-title { font-size: clamp(2rem, 5vw, 3rem); }
    body.present .stage { flex: 1; margin-bottom: 0; align-content: center; }
    body.present .layout-duo,
    body.present .layout-text-timer { grid-template-columns: repeat(2, 1fr); }
    body.present .layout-triple { grid-template-columns: repeat(3, 1fr); }
    body.present .image-panel { min-height: 0; }
    body.present .image-panel img { max-height: min(52vh, 520px); }
    body.present .timer-panel { min-height: 0; justify-content: center; }
    body.present .timer-actions { max-width: none; }

    @media (max-width: 900px) {
      .stage.layout-duo, .stage.layout-text-timer, .stage.layout-triple,
      body.present .layout-duo, body.present .layout-text-timer, body.present .layout-triple {
        grid-template-columns: 1fr;
      }
      .activity-chip { flex: 0 0 150px; max-width: none; }
      .timer-actions { grid-template-columns: 1fr; }
      .timer-actions .btn.primary { grid-column: span 1; }
      .content-checks { grid-template-columns: 1fr; }
      .content-fields-row { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="top-bar">
      <span class="app-name" id="txtAppName"></span>
      <button type="button" class="btn icon-btn" id="presentBtn"></button>
    </header>

    <section class="activity-bar" id="activityBar"></section>

    <section class="hero" id="heroHeader">
      <p class="hero-eyebrow" id="heroEyebrow"></p>
      <h1 class="announcement-title" id="announcementTitle"></h1>
      <p class="announcement-sub" id="announcementSub"></p>
    </section>

    <main class="stage" id="stage">
      <div class="image-panel" id="imagePanel" hidden>
        <img id="displayImage" alt="">
      </div>

      <div class="text-panel" id="textPanel" hidden>
        <p class="text-panel-body" id="textPanelBody"></p>
      </div>

      <div class="timer-panel" id="timerPanel" hidden>
        <div class="timer-ring">
          <div class="timer-core">
            <div class="activity-badge" id="activityBadge"></div>
            <div class="timer-face" id="timerFace">00:00</div>
            <div class="timer-label" id="timerLabel"></div>
          </div>
        </div>
        <div class="timer-actions">
          <button type="button" class="btn primary" id="startBtn"></button>
          <button type="button" class="btn" id="pauseBtn"></button>
          <button type="button" class="btn danger" id="resetBtn"></button>
        </div>
      </div>

    </main>

    <section class="settings" id="settings">
      <h2 id="txtSettingsTitle"></h2>
      <p class="hint top" id="txtSettingsHint"></p>

      <div class="field">
        <label for="editCategory" id="lblEditCategory"></label>
        <select id="editCategory">
          <option value="class-start" id="optClassStart"></option>
          <option value="solve" id="optSolve"></option>
          <option value="review" id="optReview"></option>
          <option value="assessment" id="optAssessment"></option>
          <option value="notice" id="optNotice"></option>
          <option value="other" id="optOther"></option>
        </select>
      </div>

      <div class="field">
        <label for="editName" id="lblEditName"></label>
        <input type="text" id="editName" maxlength="40">
      </div>

      <div class="field">
        <label id="lblContentTypes"></label>
        <div class="content-checks">
          <label class="check-label"><input type="checkbox" id="chkImage"><span id="lblChkImage"></span></label>
          <label class="check-label"><input type="checkbox" id="chkText"><span id="lblChkText"></span></label>
          <label class="check-label"><input type="checkbox" id="chkTimer"><span id="lblChkTimer"></span></label>
        </div>
      </div>

      <div class="content-fields-row" id="contentFieldsRow" hidden>
        <div class="content-panel" id="imageField" hidden>
          <div class="field">
            <label for="editImage" id="lblEditImage"></label>
            <input type="file" id="editImage" accept="image/*">
            <div class="thumb-row" id="editThumbRow" hidden>
              <img id="editThumb" alt="">
              <button type="button" class="btn small" id="clearEditImageBtn"></button>
            </div>
          </div>
        </div>

        <div class="content-panel" id="textField" hidden>
          <div class="field">
            <label for="editSub" id="lblEditSub"></label>
            <textarea id="editSub" rows="5" maxlength="300"></textarea>
            <p class="hint" id="txtSubHint"></p>
          </div>
          <div class="field" style="margin-top:10px">
            <label for="editFont" id="lblEditFont"></label>
            <select id="editFont">
              <option value="malgun" id="optFontMalgun"></option>
              <option value="pretendard" id="optFontPretendard"></option>
              <option value="noto" id="optFontNoto"></option>
              <option value="nanum" id="optFontNanum"></option>
              <option value="gothic" id="optFontGothic"></option>
            </select>
          </div>
        </div>

        <div class="content-panel" id="timerField" hidden>
          <div class="field">
            <label for="editMinutes" id="lblEditMinutes"></label>
            <input type="number" id="editMinutes" min="1" max="180" value="40">
          </div>
        </div>
      </div>

      <div class="settings-actions">
        <button type="button" class="btn primary" id="saveActivityBtn"></button>
        <button type="button" class="btn" id="newActivityBtn"></button>
        <button type="button" class="btn danger" id="deleteActivityBtn"></button>
        <button type="button" class="btn" id="exportJsonBtn"></button>
        <button type="button" class="btn" id="reloadJsonBtn"></button>
      </div>
      <p class="save-toast" id="saveToast" hidden></p>
    </section>
  </div>

  <button type="button" class="exit-present" id="exitPresentBtn" hidden></button>

  <script>

  function normalizeSubText(text) {
    return String(text || "").replace(/\r\n/g, "\n").replace(/\r/g, "\n");
  }

  function readSubText() {
    return normalizeSubText(els.editSub.value).replace(/^\n+|\n+$/g, "");
  }

  function escapeHtml(text) {
    return String(text)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function setMultilineDisplay(el, text) {
    var lines = normalizeSubText(text).split("\n");
    if (!lines.length || (lines.length === 1 && !lines[0])) {
      el.innerHTML = "";
      return;
    }
    el.innerHTML = lines.map(function (line) {
      return "<span class=\"text-line\">" + escapeHtml(line) + "</span>";
    }).join("");
  }

  function getFontFamily(fontKey) {
    return FONT_MAP[fontKey] || FONT_MAP.malgun;
  }

  function applyDisplayFont(activity) {
    var fontKey = (activity && activity.fontKey) || "malgun";
    var family = getFontFamily(fontKey);
    document.documentElement.style.setProperty("--display-font", family);
    els.announcementTitle.classList.add("display-text");
    els.textPanelBody.classList.add("display-text");
    els.announcementSub.classList.toggle("display-text", !els.textPanel.hidden);
  }

  function getImageSrc(activity) {
    if (!activity) return "";
    if (activity.imageDataUrl) return activity.imageDataUrl;
    if (activity.image) return activity.image;
    return "";
  }

  function uid() {

      normalizeActivity({ id: uid(), category: "class-start", name: T.detoxName, sub: T.detoxSub, minutes: 0, image: "images/detox.png", content: { image: true, text: true, timer: false } }),
      normalizeActivity({ id: uid(), category: "solve", name: T.solveName, sub: T.solveSub, minutes: 40, image: "images/solve.png", content: { image: true, text: true, timer: true } }),
      normalizeActivity({ id: uid(), category: "review", name: T.reviewName, sub: T.reviewSub, minutes: 30, image: "images/review.png", content: { image: true, text: true, timer: true } }),
      normalizeActivity({ id: uid(), category: "assessment", name: "\uC218\uD589\uD3C9\uAC00", sub: "\uD734\uB300\uD3F0 \uC81C\uCD9C\n\uD559\uB144\u00B7\uC774\uB984 \uC791\uC131", fontKey: "pretendard", minutes: 25, content: { image: false, text: true, timer: true } })
    ];
  }

  function normalizeActivity(activity) {
    var a = Object.assign({}, activity);
    if (!a.content) {
      if (a.type === "message") {
        a.content = { image: !!(a.image || a.imageDataUrl), text: true, timer: false };
        a.category = a.category || "class-start";
      } else {
        a.content = {
          image: !!(a.image || a.imageDataUrl),
          text: !!(a.sub && a.sub.trim()),
          timer: true
        };
        a.category = a.category || "other";
      }
    }
    if (!a.category) a.category = "other";
    if (!a.fontKey) a.fontKey = "malgun";
    a.sub = normalizeSubText(a.sub);
    a.minutes = Number(a.minutes) || 0;
    return a;
  }

  function getContent(activity) {
    if (!activity) return { image: false, text: false, timer: false };
    return normalizeActivity(activity).content;
  }

  function categoryLabel(category) {
    var map = {
      "class-start": T.catClassStart,
      solve: T.catSolve,
      review: T.catReview,
      assessment: T.catAssessment,
      notice: T.catNotice,
      other: T.catOther
    };
    return map[category] || T.catOther;
  }

  function readEditorContent() {
    return {
      image: els.chkImage.checked,
      text: els.chkText.checked,
      timer: els.chkTimer.checked
    };
  }

  function getActive() {
    for (var i = 0; i < state.activities.length; i++) {
      if (state.activities[i].id === state.activeId) return state.activities[i];
    }
    return null;
  }

  function formatTime(ms) {
    var total = Math.max(0, Math.floor(ms / 1000));
    var m = Math.floor(total / 60);
    var s = total % 60;
    return (m < 10 ? "0" : "") + m + ":" + (s < 10 ? "0" : "") + s;
  }

  function minutesToMs(minutes) {
    return (Number(minutes) || 0) * 60 * 1000;
  }

  function stopTick() {
    if (state.tickId) {
      clearInterval(state.tickId);
      state.tickId = null;
    }
  }

  function beep() {
    try {
      var ctx = new (window.AudioContext || window.webkitAudioContext)();
      var osc = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.frequency.value = 880;
      gain.gain.value = 0.1;
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start();
      osc.stop(ctx.currentTime + 0.35);
    } catch (e) {}
  }

  function setLabel(text, statusClass) {
    els.timerLabel.textContent = text;
    els.timerPanel.classList.remove("running", "finished");
    if (statusClass) els.timerPanel.classList.add(statusClass);
  }

  function updateDisplay() {
    var activity = getActive();
    if (!activity) return;
    var content = getContent(activity);
    var eyebrow = categoryLabel(activity.category);
    var subText = normalizeSubText(activity.sub).trim();
    var hasImg = !!(content.image && getImageSrc(activity));
    var hasTimer = !!content.timer;
    var textInStage = !!(content.text && hasTimer && subText);

    els.heroEyebrow.hidden = true;

    var hideTitle = hasImg && !hasTimer;
    els.announcementTitle.hidden = hideTitle;
    els.announcementTitle.textContent = hideTitle ? "" : activity.name;
    els.heroHeader.classList.toggle("compact", hideTitle);
    applyDisplayFont(activity);

    if (textInStage) {
      els.textPanel.hidden = false;
      setMultilineDisplay(els.textPanelBody, subText);
      els.announcementSub.innerHTML = "";
    } else {
      els.textPanel.hidden = true;
      els.textPanelBody.innerHTML = "";
      if (content.text && subText) {
        setMultilineDisplay(els.announcementSub, subText);
      } else {
        els.announcementSub.innerHTML = "";
      }
    }

    var heroHasSub = !!(content.text && subText && !textInStage);
    els.heroHeader.hidden = !(hideTitle ? heroHasSub : true);

    if (hasImg) {
      els.imagePanel.hidden = false;
      els.displayImage.src = getImageSrc(activity);
    } else {
      els.imagePanel.hidden = true;
      els.displayImage.removeAttribute("src");
    }

    els.stage.className = "stage";
    if (hasImg && textInStage && hasTimer) {
      els.stage.classList.add("layout-triple");
    } else if (hasImg && hasTimer) {
      els.stage.classList.add("layout-duo");
    } else if (textInStage && hasTimer) {
      els.stage.classList.add("layout-text-timer");
    } else if (hasTimer) {
      els.stage.classList.add("layout-timer");
    }

    if (hasTimer) {
      els.timerPanel.hidden = false;
      els.timerFace.textContent = formatTime(state.remainingMs);
    } else {
      els.timerPanel.hidden = true;
    }
  }

  function renderActivityBar() {
    els.activityBar.innerHTML = "";
    state.activities.forEach(function (activity, index) {
      var btn = document.createElement("button");
      btn.type = "button";
      btn.className = "activity-chip" + (activity.id === state.activeId ? " active" : "");
      var step = document.createElement("span");
      step.className = "step";
      step.textContent = String(index + 1);
      var body = document.createElement("span");
      body.className = "chip-body";
      var strong = document.createElement("strong");
      strong.textContent = activity.name;
      var span = document.createElement("span");
      var c = getContent(activity);
      span.textContent = c.timer ? activity.minutes + T.minSuffix : categoryLabel(activity.category);
      body.appendChild(strong);
      body.appendChild(span);
      btn.appendChild(step);
      btn.appendChild(body);
      btn.addEventListener("click", function () { selectActivity(activity.id); });
      els.activityBar.appendChild(btn);
    });
  }

  function updateContentFieldsUI() {
    var content = readEditorContent();
    els.imageField.hidden = !content.image;
    els.textField.hidden = !content.text;
    els.timerField.hidden = !content.timer;
    els.contentFieldsRow.hidden = !(content.image || content.text || content.timer);
  }

  function applyCategoryPreset(category, force) {
    var preset = CATEGORY_PRESETS[category];
    if (!preset) return;
    if (force || !els.editName.value.trim()) els.editName.value = preset.name;
    if (force || !els.editSub.value.trim()) els.editSub.value = preset.sub;
    if (force || els.editMinutes.value === "40" || els.editMinutes.value === "0") {
      els.editMinutes.value = preset.minutes || 40;
    }
    if (force) {
      els.chkImage.checked = preset.content.image;
      els.chkText.checked = preset.content.text;
      els.chkTimer.checked = preset.content.timer;
    }
    updateContentFieldsUI();
  }

  function loadEditor(activity) {
    if (!activity) {
      state.editingId = null;
      els.editCategory.value = "other";
      els.editName.value = "";
      els.editSub.value = "";
      els.editMinutes.value = 40;
      els.chkImage.checked = false;
      els.chkText.checked = true;
      els.chkTimer.checked = false;
      editingImageDataUrl = "";
      editingImagePath = "";
      els.editImage.value = "";
      els.editThumbRow.hidden = true;
      updateContentFieldsUI();
      return;
    }
    activity = normalizeActivity(activity);
    state.editingId = activity.id;
    els.editCategory.value = activity.category || "other";
    els.editName.value = activity.name;
    els.editSub.value = activity.sub || "";
    els.editFont.value = activity.fontKey || "malgun";
    els.editMinutes.value = activity.minutes || 40;
    els.chkImage.checked = !!activity.content.image;
    els.chkText.checked = !!activity.content.text;
    els.chkTimer.checked = !!activity.content.timer;
    editingImageDataUrl = activity.imageDataUrl || "";
    editingImagePath = activity.image || "";
    var preview = editingImageDataUrl || editingImagePath;
    els.editThumbRow.hidden = !preview;
    if (preview) els.editThumb.src = preview;
    updateContentFieldsUI();
  }

  function resetTimerForActivity(activity) {
    stopTick();
    state.running = false;
    state.paused = false;
    state.remainingMs = minutesToMs(activity && activity.minutes ? activity.minutes : 0);
    setLabel(T.ready);
  }

  function captureTimerState() {
    return {
      running: state.running,
      paused: state.paused,
      remainingMs: state.remainingMs,
      endTime: state.endTime
    };
  }

  function restoreTimerState(snap) {
    stopTick();
    state.running = snap.running;
    state.paused = snap.paused;
    state.remainingMs = snap.remainingMs;
    if (snap.running && !snap.paused) {
      state.endTime = Date.now() + snap.remainingMs;
      state.tickId = setInterval(onTick, 200);
      setLabel(T.running, "running");
    } else if (snap.paused) {
      state.endTime = snap.endTime;
      setLabel(T.paused);
    } else {
      setLabel(T.ready);
    }
  }

  function refreshActivityView() {
    var activity = getActive();
    loadEditor(activity);
    renderActivityBar();
    updateDisplay();
    save();
  }

  function selectActivity(id) {
    state.activeId = id;
    resetTimerForActivity(getActive());
    refreshActivityView();
  }

  function onTick() {
    state.remainingMs = Math.max(0, state.endTime - Date.now());
    updateDisplay();
    if (state.remainingMs <= 0) {
      stopTick();
      state.running = false;
      setLabel(T.finished, "finished");
      beep();
    }
  }

  function start() {
    var activity = getActive();
    if (!activity || !getContent(activity).timer) return;
    if (state.running && !state.paused) return;
    if (!state.paused) {
      state.remainingMs = minutesToMs(activity.minutes);
      if (state.remainingMs <= 0) { setLabel(T.setTime); return; }
    }
    state.endTime = Date.now() + state.remainingMs;
    state.running = true;
    state.paused = false;
    stopTick();
    state.tickId = setInterval(onTick, 200);
    onTick();
    setLabel(T.running, "running");
  }

  function pause() {
    if (!state.running || state.paused) return;
    stopTick();
    state.paused = true;
    state.running = false;
    state.remainingMs = Math.max(0, state.endTime - Date.now());
    setLabel(T.paused);
    updateDisplay();
  }

  function reset() {
    var activity = getActive();
    stopTick();
    state.running = false;
    state.paused = false;
    state.remainingMs = minutesToMs(activity && activity.minutes ? activity.minutes : 0);
    setLabel(T.ready);
    updateDisplay();
  }

  function showSaveToast() {
    els.saveToast.textContent = T.savedOk;
    els.saveToast.hidden = false;
    clearTimeout(showSaveToast._timer);
    showSaveToast._timer = setTimeout(function () {
      els.saveToast.hidden = true;
    }, 2500);
  }

  function saveActivity() {
    var name = els.editName.value.trim();
    var content = readEditorContent();
    var minutes = content.timer ? Number(els.editMinutes.value) : 0;
    if (!name) { alert(T.needName); return; }
    if (!content.image && !content.text && !content.timer) { alert(T.needContent); return; }
    if (content.text && !readSubText()) { alert(T.needText); return; }
    if (content.timer && (!minutes || minutes < 1)) { alert(T.needMinutes); return; }

    var savingId = state.editingId;
    var isSameActive = !!savingId && savingId === state.activeId;
    var oldMinutes = isSameActive && getActive() ? getActive().minutes : null;
    var timerSnap = isSameActive ? captureTimerState() : null;

    var payload = {
      category: els.editCategory.value,
      name: name,
      sub: content.text ? readSubText() : "",
      fontKey: els.editFont.value || "malgun",
      minutes: minutes,
      content: content,
      image: "",
      imageDataUrl: ""
    };
    if (content.image) {
      payload.imageDataUrl = editingImageDataUrl;
      payload.image = editingImageDataUrl ? "" : editingImagePath;
    }
    if (state.editingId) {
      for (var i = 0; i < state.activities.length; i++) {
        if (state.activities[i].id === state.editingId) {
          state.activities[i] = normalizeActivity(Object.assign({}, state.activities[i], payload));
          break;
        }
      }
    } else {
      var created = normalizeActivity(Object.assign({ id: uid() }, payload));
      state.activities.push(created);
      state.activeId = created.id;
      state.editingId = created.id;
    }

    state.activeId = state.editingId || state.activeId;
    var activity = getActive();
    if (timerSnap && oldMinutes === activity.minutes) {
      restoreTimerState(timerSnap);
    } else {
      resetTimerForActivity(activity);
    }

    refreshActivityView();
    showSaveToast();
  }

  function newActivity() {
    reset();
    state.editingId = null;
    loadEditor(null);
    applyCategoryPreset(els.editCategory.value, true);
    els.editName.focus();
  }

  function deleteActivity() {
    if (!state.editingId) { alert(T.needSelectDel); return; }
    if (!confirm(T.confirmDel)) return;
    state.activities = state.activities.filter(function (a) { return a.id !== state.editingId; });
    if (state.activities.length === 0) state.activities = defaultActivities();
    selectActivity(state.activities[0].id);
  }

  function enterPresent() {
    document.body.classList.add("present");
    els.exitPresentBtn.hidden = false;
    if (document.documentElement.requestFullscreen) {
      document.documentElement.requestFullscreen().catch(function () {});
    }
  }

  function exitPresent() {
    document.body.classList.remove("present");
    els.exitPresentBtn.hidden = true;
    if (document.fullscreenElement && document.exitFullscreen) {
      document.exitFullscreen().catch(function () {});
    }
  }

  function exportForGitHub() {
    var out = {
      activities: state.activities.map(function (a) {
        a = normalizeActivity(a);
        return {
          id: a.id,
          category: a.category,
          name: a.name,
          sub: a.sub || "",
          fontKey: a.fontKey || "malgun",
          minutes: a.minutes || 0,
          image: a.imageDataUrl ? "" : (a.image || ""),
          content: a.content
        };
      })
    };
    var text = JSON.stringify(out, null, 2);
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function () {
        alert(T.exportOk);
      }).catch(function () {
        prompt("activities.json", text);
      });
    } else {
      prompt("activities.json", text);
    }
  }

  function reloadFromGitHub() {
    if (!confirm(T.reloadConfirm)) return;
    fetch("activities.json?v=" + Date.now())
      .then(function (res) { return res.json(); })
      .then(function (data) {
        if (data.activities && data.activities.length > 0) {
          state.activities = data.activities.map(normalizeActivity);
          state.activeId = data.activities[0].id;
          save();
          selectActivity(state.activeId);
        }
      })
      .catch(function () {
        alert("activities.json\uC744 \uBD88\uB7EC\uC62C \uC218 \uC5C6\uC2B5\uB2C8\uB2E4.\nPC\uC5D0\uC11C git push\uB85C \uC62C\uB9AC\uACE0, \uC6F9\uC5D0 \uBD99\uC5EC\uB123\uC9C0 \uB9C8\uC138\uC694.");
      });
  }

  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      activities: state.activities,
      activeId: state.activeId
    }));
  }

  function loadActivities(done) {
    try {
      var data = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
      if (data.activities && data.activities.length > 0) {
        state.activities = data.activities.map(normalizeActivity);
        state.activeId = data.activeId || data.activities[0].id;
        done();
        return;
      }
    } catch (e) {}
    fetch("activities.json?v=" + Date.now())
      .then(function (res) { return res.json(); })
      .then(function (data) {
        state.activities = (data.activities && data.activities.length) ? data.activities.map(normalizeActivity) : defaultActivities();
        state.activeId = state.activities[0].id;
        save();
        done();
      })
      .catch(function () {
        state.activities = defaultActivities();
        state.activeId = state.activities[0].id;
        done();
      });
  }

  els.editCategory.addEventListener("change", function () {
    if (!state.editingId) applyCategoryPreset(els.editCategory.value, true);
  });
  els.chkImage.addEventListener("change", updateContentFieldsUI);
  els.chkText.addEventListener("change", updateContentFieldsUI);
  els.chkTimer.addEventListener("change", updateContentFieldsUI);
  els.editImage.addEventListener("change", function (e) {
    var file = e.target.files && e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function () {
      editingImageDataUrl = reader.result;
      editingImagePath = "";
      els.editThumb.src = editingImageDataUrl;
      els.editThumbRow.hidden = false;
    };
    reader.readAsDataURL(file);
  });
  els.clearEditImageBtn.addEventListener("click", function () {
    editingImageDataUrl = "";
    editingImagePath = "";
    els.editImage.value = "";
    els.editThumbRow.hidden = true;
  });
  els.saveActivityBtn.addEventListener("click", saveActivity);
  els.newActivityBtn.addEventListener("click", newActivity);
  els.deleteActivityBtn.addEventListener("click", deleteActivity);
  els.exportJsonBtn.addEventListener("click", exportForGitHub);
  els.reloadJsonBtn.addEventListener("click", reloadFromGitHub);
  els.startBtn.addEventListener("click", start);
  els.pauseBtn.addEventListener("click", pause);
  els.resetBtn.addEventListener("click", reset);
  els.presentBtn.addEventListener("click", enterPresent);
  els.exitPresentBtn.addEventListener("click", exitPresent);
  document.addEventListener("fullscreenchange", function () {
    if (!document.fullscreenElement && document.body.classList.contains("present")) exitPresent();
  });

  applyStaticText();
  loadActivities(function () {
    selectActivity(state.activeId);
  });
})();
  </script>
</body>
</html>
